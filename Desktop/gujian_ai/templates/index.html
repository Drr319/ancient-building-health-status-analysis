<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>古建筑分析系统 - 主页</title>
</head>
<body>
    <h1>欢迎使用古建筑分析系统</h1>
    <div>
        <h3>建筑名称：{{ building.name }}</h3>
        <p>所在位置：{{ building.location }}</p >
        <p>建造年份：{{ building.build_year }}</p >
        <p>结构类型：{{ building.structure }}</p >
        <p>维护状态：{{ building.maintenance }}</p >
        <p>简介：{{ building.description }}</p >
    </div>
    <a href=" ">点击查看分析报告</a >
</body>
</html>
